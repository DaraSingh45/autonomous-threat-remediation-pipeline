global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "event-generator"
    static_configs:
      - targets: ["event-generator:9100"]

  - job_name: "detection-engine"
    static_configs:
      - targets: ["detection-engine:9101"]

  - job_name: "decision-engine"
    static_configs:
      - targets: ["decision-engine:9102"]

  - job_name: "remediation-agent"
    static_configs:
      - targets: ["remediation-agent:9103"]

  - job_name: "mock-iam-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["mock-iam-service:8080"]

  - job_name: "audit-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["audit-service:8090"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
