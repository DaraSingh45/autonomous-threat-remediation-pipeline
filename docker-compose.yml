version: "3.9"

# Autonomous Threat Remediation Pipeline - local development stack.
#
# Brings up a single-broker Kafka (KRaft mode, no Zookeeper needed), all six
# pipeline services, and the Prometheus/Grafana observability stack.
#
# Quickstart:
#   docker compose up --build
#   open http://localhost:3000            (Grafana, admin/admin)
#   open http://localhost:8090/audit      (raw audit trail, JSON)
#   open http://localhost:9090            (Prometheus)
#
# By default the Remediation Agent runs with K8S_MODE=simulated, so the
# entire flow works without a real Kubernetes cluster. See docs/SETUP.md to
# point it at a real kind/minikube cluster instead.

services:
  # ---------------------------------------------------------------------
  # Telemetry backplane
  # ---------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: atrp-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks: [atrp]

  # Internally services talk to `kafka:29092`; the KAFKA_BOOTSTRAP_SERVERS
  # env var below is set per-service to that internal listener.

  # ---------------------------------------------------------------------
  # Pipeline services
  # ---------------------------------------------------------------------
  event-generator:
    build:
      context: .
      dockerfile: services/event_generator/Dockerfile
    container_name: atrp-event-generator
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EVENTS_TOPIC: security-events
      EVENTS_PER_SECOND: "5"
      ATTACK_PROBABILITY: "0.08"
      METRICS_PORT: "9100"
      LOG_LEVEL: INFO
    ports:
      - "9100:9100"
    networks: [atrp]
    restart: unless-stopped

  mock-iam-service:
    build:
      context: .
      dockerfile: services/mock_iam_service/Dockerfile
    container_name: atrp-mock-iam-service
    ports:
      - "8080:8080"
    environment:
      LOG_LEVEL: INFO
    networks: [atrp]
    restart: unless-stopped

  remediation-agent:
    build:
      context: .
      dockerfile: services/remediation_agent/Dockerfile
    container_name: atrp-remediation-agent
    depends_on:
      - mock-iam-service
    environment:
      GRPC_PORT: "50052"
      K8S_MODE: simulated   # set to "real" + mount a kubeconfig to act on an actual cluster
      MOCK_IAM_URL: http://mock-iam-service:8080
      METRICS_PORT: "9103"
      LOG_LEVEL: INFO
    ports:
      - "50052:50052"
      - "9103:9103"
    networks: [atrp]
    restart: unless-stopped
    # Uncomment to point this at a real cluster from your host machine:
    # volumes:
    #   - ${HOME}/.kube/config:/home/appuser/.kube/config:ro

  decision-engine:
    build:
      context: .
      dockerfile: services/decision_engine/Dockerfile
    container_name: atrp-decision-engine
    depends_on:
      kafka:
        condition: service_healthy
      remediation-agent:
        condition: service_started
    environment:
      GRPC_PORT: "50051"
      REMEDIATION_AGENT_ADDR: remediation-agent:50052
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AUDIT_TOPIC: audit-log
      AUTONOMOUS_MODE: "true"   # flip to "false" to see the manual-triage MTTR baseline in Grafana
      SIMULATED_MANUAL_TRIAGE_SECONDS: "20"
      REMEDIATION_COOLDOWN_SECONDS: "300"
      METRICS_PORT: "9102"
      LOG_LEVEL: INFO
    ports:
      - "50051:50051"
      - "9102:9102"
    networks: [atrp]
    restart: unless-stopped

  detection-engine:
    build:
      context: .
      dockerfile: services/detection_engine/Dockerfile
    container_name: atrp-detection-engine
    depends_on:
      kafka:
        condition: service_healthy
      decision-engine:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EVENTS_TOPIC: security-events
      DECISION_ENGINE_ADDR: decision-engine:50051
      MIN_SEVERITY_TO_ESCALATE: medium
      METRICS_PORT: "9101"
      LOG_LEVEL: INFO
    ports:
      - "9101:9101"
    networks: [atrp]
    restart: unless-stopped

  audit-service:
    build:
      context: .
      dockerfile: services/audit_service/Dockerfile
    container_name: atrp-audit-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AUDIT_TOPIC: audit-log
      AUDIT_DB_PATH: /data/audit.db
      PORT: "8090"
      LOG_LEVEL: INFO
    ports:
      - "8090:8090"
    volumes:
      - audit-data:/data
    networks: [atrp]
    restart: unless-stopped

  # ---------------------------------------------------------------------
  # Observability
  # ---------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: atrp-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks: [atrp]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    container_name: atrp-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks: [atrp]
    restart: unless-stopped

networks:
  atrp:
    name: atrp-network

volumes:
  audit-data:
  grafana-data:
