name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/event_generator/requirements.txt
          pip install -r services/detection_engine/requirements.txt
          pip install -r services/decision_engine/requirements.txt
          pip install -r services/remediation_agent/requirements.txt
          pip install -r services/mock_iam_service/requirements.txt
          pip install -r services/audit_service/requirements.txt
          pip install pytest ruff grpcio-tools

      - name: Lint
        run: ruff check services tests

      - name: Regenerate gRPC stubs (sanity check the .proto still compiles)
        run: |
          python -m grpc_tools.protoc -I proto \
            --python_out=proto/generated/python \
            --grpc_python_out=proto/generated/python \
            --pyi_out=proto/generated/python \
            proto/pipeline.proto

      - name: Run unit tests
        run: pytest tests/ -v

  docker-build:
    name: Build all service images
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      matrix:
        service:
          - event_generator
          - detection_engine
          - decision_engine
          - remediation_agent
          - mock_iam_service
          - audit_service
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }} image
        run: |
          docker build \
            -t "atrp/${{ matrix.service }}:ci" \
            -f "services/${{ matrix.service }}/Dockerfile" \
            .

  validate-k8s-manifests:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          chmod +x kubeconform

      - name: Validate manifests
        run: |
          ./kubeconform -strict -summary \
            k8s/base/*.yaml k8s/monitoring/*.yaml k8s/demo-workloads/*.yaml
